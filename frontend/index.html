The backend acts as the "Engine," processing logic and communicating with MongoDB Atlas.

1. The Environment Setup
Provisioning: Launch an Ubuntu 24.04 LTS instance (t2.micro).

Access: Use PowerShell/Terminal to connect:

Node.js Installation:

Bash

2. Application Setup
Clone & Install:

Bash

Environment Variables: Create a .env file (nano .env) and include:

MONGODB_URI: Your Atlas connection string.

PORT: 5000

Process Management (PM2):

Bash

pm2 start index.js --name "blog-api"
pm2 save

3. AWS Network Configuration (Security Groups)
You must allow traffic to reach your "Engine." In the AWS Console, add these Inbound Rules:

Protocol	Port	Source	Reason
SSH	22	My IP	To log in to the server
HTTP	80	0.0.0.0/0	For standard web traffic
Custom TCP	5000	0.0.0.0/0	To allow frontend to talk to API
Part 2: Frontend Deployment (AWS S3)
The frontend is the "Interface," hosted as static files.

1. Build and Link
Crucial Step: In your local React/Vite code, ensure your API base URL points to your EC2 IP:
const API_BASE_URL = "http://<EC2-Public-IP>:5000";

Create Build: Run npm run build in your local terminal.

2. S3 Hosting
Bucket Creation: Create a bucket with "Block all public access" turned OFF.

Upload: Upload the contents of your dist/ or build/ folder.

Static Website Hosting: In the Properties tab, enable hosting and set index.html as the index document.

Bucket Policy: In the Permissions tab, add this JSON:

JSON
{
    "Version": "2012-10-17",
    "Statement": [{
        "Sid": "PublicReadGetObject",
        "Effect": "Allow",
        "Principal": "*",
        "Action": "s3:GetObject",
        "Resource": "arn:aws:s3:::YOUR-BUCKET-NAME/*"
    }]
}
Part 3: Troubleshooting & Solutions
Possible Error	Likely Cause	Solution
Permission Denied (PEM Key)	Windows permissions are too broad.	Run icacls commands to restrict access to your user only.
ERR_CONNECTION_REFUSED	Port 5000 is not open in AWS Security Groups.	Add Port 5000 to Inbound Rules in the EC2 Dashboard.
MongoNetworkError	Atlas is blocking the EC2 instance.	Go to Atlas -> Network Access -> Add EC2 Public IP to Whitelist.
404 Not Found (API)	Route not defined or Nginx misconfigured.	Use pm2 logs to see if the request hits the server. Check app.get('/').
CORS Error	Backend doesn't trust the S3 URL.	Install cors in backend and use app.use(cors()).
White Screen on Refresh	S3 doesn't handle Client-side routing.	Set index.html as the Error Document in S3 Hosting settings.
Final Architecture Check
User visits the S3 Website URL.

The Browser downloads the React app.

The React app sends a request to the EC2 IP on Port 5000.

The EC2 Server fetches data from MongoDB Atlas.

The Blog Posts appear on the screen!

Phase 1: Local Machine (Fixing the SSH Key)
Run these in PowerShell on your Windows machine to fix the "Bad Permissions" error before connecting.

PowerShell
# 1. Reset permissions to default
icacls.exe "blog-key.pem" /reset

# 2. Grant Read access to YOUR user only
icacls.exe "blog-key.pem" /grant:r "$($env:username):R"

# 3. Remove all other users/inheritance
icacls.exe "blog-key.pem" /inheritance:r
